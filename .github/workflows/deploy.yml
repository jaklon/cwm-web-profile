name: 🚀 Build & Deploy CWM Website to Rumahweb

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies (fresh, platform-aware)
        run: |
          rm -f package-lock.json
          npm install --prefer-offline

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          CI: false

      - name: 🔍 Verify build output
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== Checking .htaccess ==="
          ls dist/.htaccess && echo ".htaccess OK ✅" || echo ".htaccess MISSING ❌"
          echo "=== Checking index.html ==="
          head -3 dist/index.html

      - name: 🚀 Deploy to Rumahweb via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store